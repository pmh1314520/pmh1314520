name: Refresh Dynamic Assets

on:
  schedule:
    - cron: "30 2 * * *"        # 每日 UTC 02:30 运行一次（每 24h，满足需求 7.3/9.1）
  workflow_dispatch:             # 支持手动触发
  push:
    branches: [main]             # 便于首次/改动后立即生成

concurrency:
  group: refresh-assets
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Generate snake svg (dark + light)
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: pmh1314520
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark

      - name: Generate age card svg (auto-updating age)
        run: |
          mkdir -p dist
          python3 - <<'PY'
          from datetime import date
          BIRTH = date(2006, 10, 26)
          today = date.today()
          years = today.year - BIRTH.year - ((today.month, today.day) < (BIRTH.month, BIRTH.day))
          if (today.month, today.day) >= (BIRTH.month, BIRTH.day):
              last = date(today.year, BIRTH.month, BIRTH.day)
          else:
              last = date(today.year - 1, BIRTH.month, BIRTH.day)
          days = (today - last).days
          total = (today - BIRTH).days
          cn = "%d \u5c81 \u00b7 \u65b0\u7684\u4e00\u5c81\u5df2\u8d70\u8fc7 %d \u5929" % (years, days)
          en = "%d years old  \u00b7  %d days on Earth" % (years, total)
          svg = '''<svg xmlns="http://www.w3.org/2000/svg" width="440" height="96" viewBox="0 0 440 96" role="img" aria-label="Age">
            <style>
              .card {{ fill: #FFFFFF; stroke: #D0D7DE; }}
              .big  {{ fill: #7C3AED; font: 700 22px 'Segoe UI','PingFang SC',sans-serif; }}
              .sub  {{ fill: #1F2328; font: 600 14px 'Segoe UI','PingFang SC',sans-serif; }}
              .en   {{ fill: #6E7781; font: 500 11px 'Segoe UI',sans-serif; }}
              @media (prefers-color-scheme: dark) {{
                .card {{ fill: #0D1117; stroke: #30363D; }}
                .big  {{ fill: #8B5CF6; }}
                .sub  {{ fill: #C9D1D9; }}
                .en   {{ fill: #8B949E; }}
              }}
            </style>
            <defs>
              <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0">
                <stop offset="0" stop-color="#8B5CF6"/>
                <stop offset="0.5" stop-color="#22D3EE"/>
                <stop offset="1" stop-color="#F472B6"/>
              </linearGradient>
            </defs>
            <rect class="card" x="1" y="1" width="438" height="94" rx="14" stroke-width="1.5"/>
            <rect x="1" y="1" width="438" height="5" rx="2.5" fill="url(#bar)"/>
            <circle cx="46" cy="50" r="22" fill="none" stroke="url(#bar)" stroke-width="3"/>
            <text x="46" y="58" text-anchor="middle" class="big">{yrs}</text>
            <text x="86" y="44" class="sub">{cn}</text>
            <text x="86" y="66" class="en">{en}</text>
          </svg>'''.format(yrs=years, cn=cn, en=en)
          open("dist/age.svg", "w", encoding="utf-8").write(svg)
          print("age generated:", years, days, total)
          PY

      - name: Push to output branch (only if changed)
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
