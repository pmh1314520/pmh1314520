name: Refresh Dynamic Assets

on:
  schedule:
    - cron: "30 2 * * *"        # 每日 UTC 02:30 运行一次（每 24h，满足需求 7.3/9.1）
  workflow_dispatch:             # 支持手动触发
  push:
    branches: [main]             # 便于首次/改动后立即生成

concurrency:
  group: refresh-assets
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Generate snake svg (dark + light)
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: pmh1314520
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark

      - name: Generate age card svg (auto-updating age)
        run: |
          mkdir -p dist
          python3 - <<'PY'
          from datetime import date
          BIRTH = date(2006, 10, 26)
          today = date.today()
          years = today.year - BIRTH.year - ((today.month, today.day) < (BIRTH.month, BIRTH.day))
          if (today.month, today.day) >= (BIRTH.month, BIRTH.day):
              last = date(today.year, BIRTH.month, BIRTH.day)
          else:
              last = date(today.year - 1, BIRTH.month, BIRTH.day)
          days = (today - last).days
          total = (today - BIRTH).days
          cn = "%d \u5c81 \u00b7 \u65b0\u7684\u4e00\u5c81\u5df2\u8d70\u8fc7 %d \u5929" % (years, days)
          en = "%d years old  \u00b7  %d days on Earth" % (years, total)
          svg = '''<svg xmlns="http://www.w3.org/2000/svg" width="440" height="96" viewBox="0 0 440 96" role="img" aria-label="Age">
            <style>
              .card {{ fill: #FFFFFF; stroke: #D0D7DE; }}
              .big  {{ fill: #0284C7; font: 700 22px 'Segoe UI','PingFang SC',sans-serif; }}
              .sub  {{ fill: #1F2328; font: 600 14px 'Segoe UI','PingFang SC',sans-serif; }}
              .en   {{ fill: #6E7781; font: 500 11px 'Segoe UI',sans-serif; }}
              @media (prefers-color-scheme: dark) {{
                .card {{ fill: #0D1117; stroke: #30363D; }}
                .big  {{ fill: #38BDF8; }}
                .sub  {{ fill: #C9D1D9; }}
                .en   {{ fill: #8B949E; }}
              }}
            </style>
            <defs>
              <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0">
                <stop offset="0" stop-color="#38BDF8"/>
                <stop offset="0.5" stop-color="#22D3EE"/>
                <stop offset="1" stop-color="#2DD4BF"/>
              </linearGradient>
            </defs>
            <rect class="card" x="1" y="1" width="438" height="94" rx="14" stroke-width="1.5"/>
            <rect x="1" y="1" width="438" height="5" rx="2.5" fill="url(#bar)"/>
            <circle cx="46" cy="50" r="22" fill="none" stroke="url(#bar)" stroke-width="3"/>
            <text x="46" y="58" text-anchor="middle" class="big">{yrs}</text>
            <text x="86" y="44" class="sub">{cn}</text>
            <text x="86" y="66" class="en">{en}</text>
          </svg>'''.format(yrs=years, cn=cn, en=en)
          open("dist/age.svg", "w", encoding="utf-8").write(svg)
          print("age generated:", years, days, total)
          PY

      - name: Generate daily quote svg
        continue-on-error: true
        run: |
          mkdir -p dist
          python3 - <<'PY'
          from datetime import date
          quotes = [
            ("学习是永无止境的，学以致用才是王道", "Learning never ends; applying it is the true way."),
            ("先让它跑起来，再让它跑得快", "Make it work, then make it fast."),
            ("代码是写给人看的，顺便让机器执行", "Code is written for humans to read."),
            ("把复杂留给自己，把简单交给用户", "Keep the complexity, give away the simplicity."),
            ("好的架构是一点点演化出来的", "Good architecture evolves step by step."),
            ("与其抱怨黑暗，不如提灯前行", "Rather than curse the dark, carry a lamp forward."),
            ("不积跬步，无以至千里", "A journey of a thousand miles begins with a step."),
            ("纸上得来终觉浅，绝知此事要躬行", "Knowledge from books is shallow; practice is key."),
            ("热爱可抵岁月漫长", "Passion outlasts the long years."),
            ("保持好奇，持续创造", "Stay curious, keep creating."),
            ("简单是可靠的前提", "Simplicity is the prerequisite for reliability."),
            ("每天进步一点点", "A little progress every single day."),
          ]
          idx = date.today().timetuple().tm_yday % len(quotes)
          cn, en = quotes[idx]
          tmpl = '''<svg xmlns="http://www.w3.org/2000/svg" width="760" height="72" viewBox="0 0 760 72" role="img" aria-label="quote">
            <style>
              .c { fill:#FFFFFF; stroke:#D0D7DE; }
              .q { fill:#1F2328; font:600 18px 'Segoe UI','PingFang SC',sans-serif; }
              .e { fill:#6E7781; font:italic 12px 'Segoe UI',sans-serif; }
              @media (prefers-color-scheme: dark) { .c{fill:#0D1117;stroke:#30363D;} .q{fill:#C9D1D9;} .e{fill:#8B949E;} }
            </style>
            <defs><linearGradient id="b" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#38BDF8"/><stop offset="1" stop-color="#22D3EE"/></linearGradient></defs>
            <rect class="c" x="1" y="1" width="758" height="70" rx="12" stroke-width="1.5"/>
            <rect x="1" y="1" width="6" height="70" rx="3" fill="url(#b)"/>
            <text x="30" y="32" class="q">%(cn)s</text>
            <text x="30" y="54" class="e">%(en)s</text>
          </svg>'''
          open("dist/quote.svg", "w", encoding="utf-8").write(tmpl % {"cn": cn, "en": en})
          print("quote generated idx", idx)
          PY

      - name: Generate stats dashboard svg
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p dist
          python3 - <<'PY'
          import json, os, urllib.request
          tok = os.environ.get("GH_TOKEN", "")
          def api(url):
              req = urllib.request.Request(url, headers={"User-Agent": "profile-readme", "Authorization": "Bearer %s" % tok, "Accept": "application/vnd.github+json"})
              return json.load(urllib.request.urlopen(req, timeout=30))
          user = api("https://api.github.com/users/pmh1314520")
          repos = api("https://api.github.com/users/pmh1314520/repos?per_page=100&type=owner")
          stars = sum(r.get("stargazers_count", 0) for r in repos)
          forks = sum(r.get("forks_count", 0) for r in repos)
          followers = user.get("followers", 0)
          public = user.get("public_repos", 0)
          tiles = [(public, "Repos"), (stars, "Stars"), (forks, "Forks"), (followers, "Followers")]
          cells = ""
          for i, (num, lab) in enumerate(tiles):
              cx = 95 + i * 190
              cells += '<text x="%d" y="58" text-anchor="middle" class="num">%s</text>' % (cx, num)
              cells += '<text x="%d" y="86" text-anchor="middle" class="lab">%s</text>' % (cx, lab)
              if i > 0:
                  cells += '<line x1="%d" y1="28" x2="%d" y2="92" class="sep"/>' % (i * 190, i * 190)
          tmpl = '''<svg xmlns="http://www.w3.org/2000/svg" width="760" height="120" viewBox="0 0 760 120" role="img" aria-label="stats dashboard">
            <style>
              .c { fill:#FFFFFF; stroke:#D0D7DE; }
              .num { fill:#0284C7; font:800 30px 'Segoe UI',sans-serif; }
              .lab { fill:#1F2328; font:600 13px 'Segoe UI',sans-serif; letter-spacing:1px; }
              .sep { stroke:#D0D7DE; stroke-width:1; }
              @media (prefers-color-scheme: dark) { .c{fill:#0D1117;stroke:#30363D;} .num{fill:#38BDF8;} .lab{fill:#C9D1D9;} .sep{stroke:#30363D;} }
            </style>
            <defs><linearGradient id="bar" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#38BDF8"/><stop offset="0.5" stop-color="#22D3EE"/><stop offset="1" stop-color="#2DD4BF"/></linearGradient></defs>
            <rect class="c" x="1" y="1" width="758" height="118" rx="14" stroke-width="1.5"/>
            <rect x="1" y="1" width="758" height="5" rx="2.5" fill="url(#bar)"/>
            %(cells)s
          </svg>'''
          open("dist/dashboard.svg", "w", encoding="utf-8").write(tmpl % {"cells": cells})
          print("dashboard", stars, forks, followers, public)
          PY

      - name: Generate 3D contribution graph
        continue-on-error: true
        uses: yoshi389111/github-profile-3d-contrib@0.7.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: pmh1314520

      - name: Copy 3D graph into dist
        continue-on-error: true
        run: |
          mkdir -p dist
          cp -f profile-3d-contrib/profile-night-green.svg dist/profile-3d.svg || true

      - name: Push to output branch (only if changed)
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
