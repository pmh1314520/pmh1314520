<svg xmlns="http://www.w3.org/2000/svg" width="440" height="96" viewBox="0 0 440 96" role="img" aria-label="Age">
  <style>
    .card { fill: #FFFFFF; stroke: #D0D7DE; }
    .big  { fill: #0284C7; font: 700 22px 'Segoe UI','PingFang SC',sans-serif; }
    .sub  { fill: #1F2328; font: 600 14px 'Segoe UI','PingFang SC',sans-serif; }
    .en   { fill: #6E7781; font: 500 11px 'Segoe UI',sans-serif; }
    @media (prefers-color-scheme: dark) {
      .card { fill: #0D1117; stroke: #30363D; }
      .big  { fill: #38BDF8; }
      .sub  { fill: #C9D1D9; }
      .en   { fill: #8B949E; }
    }
  </style>
  <defs>
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38BDF8"/>
      <stop offset="0.5" stop-color="#22D3EE"/>
      <stop offset="1" stop-color="#2DD4BF"/>
    </linearGradient>
  </defs>
  <rect class="card" x="1" y="1" width="438" height="94" rx="14" stroke-width="1.5"/>
  <rect x="1" y="1" width="438" height="5" rx="2.5" fill="url(#bar)"/>
  <circle cx="46" cy="50" r="22" fill="none" stroke="url(#bar)" stroke-width="3"/>
  <text x="46" y="58" text-anchor="middle" class="big">19</text>
  <text x="86" y="44" class="sub">19 岁 · 新的一岁已走过 271 天</text>
  <text x="86" y="66" class="en">19 years old  ·  7211 days on Earth</text>
</svg>