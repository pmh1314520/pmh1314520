<svg xmlns="http://www.w3.org/2000/svg" width="760" height="120" viewBox="0 0 760 120" role="img" aria-label="stats dashboard">
  <style>
    .c { fill:#FFFFFF; stroke:#D0D7DE; }
    .num { fill:#0284C7; font:800 30px 'Segoe UI',sans-serif; }
    .lab { fill:#1F2328; font:600 13px 'Segoe UI',sans-serif; letter-spacing:1px; }
    .sep { stroke:#D0D7DE; stroke-width:1; }
    @media (prefers-color-scheme: dark) { .c{fill:#0D1117;stroke:#30363D;} .num{fill:#38BDF8;} .lab{fill:#C9D1D9;} .sep{stroke:#30363D;} }
  </style>
  <defs><linearGradient id="bar" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#38BDF8"/><stop offset="0.5" stop-color="#22D3EE"/><stop offset="1" stop-color="#2DD4BF"/></linearGradient></defs>
  <rect class="c" x="1" y="1" width="758" height="118" rx="14" stroke-width="1.5"/>
  <rect x="1" y="1" width="758" height="5" rx="2.5" fill="url(#bar)"/>
  <text x="95" y="58" text-anchor="middle" class="num">8</text><text x="95" y="86" text-anchor="middle" class="lab">Repos</text><text x="285" y="58" text-anchor="middle" class="num">2049</text><text x="285" y="86" text-anchor="middle" class="lab">Stars</text><line x1="190" y1="28" x2="190" y2="92" class="sep"/><text x="475" y="58" text-anchor="middle" class="num">188</text><text x="475" y="86" text-anchor="middle" class="lab">Forks</text><line x1="380" y1="28" x2="380" y2="92" class="sep"/><text x="665" y="58" text-anchor="middle" class="num">24</text><text x="665" y="86" text-anchor="middle" class="lab">Followers</text><line x1="570" y1="28" x2="570" y2="92" class="sep"/>
</svg>